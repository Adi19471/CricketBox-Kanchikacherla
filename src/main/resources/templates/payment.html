
<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
</head>
<body>

<h2>Pay for Booking</h2>

<button onclick="payNow()">Pay ₹500</button>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
function payNow() {

    // Step 1: Call backend to create order
    fetch("http://localhost:4040/payment/create-order?amount=500", {
        method: "POST"
    })
    .then(response => response.json())
    .then(order => {

        // Step 2: Open Razorpay popup
        var options = {
            "key": "rzp_test_SNS2Tav8Q30FBI", // 🔑 Replace this
            "amount": order.amount,
            "currency": "INR",
            "name": "Nets Cricket",
            "description": "Booking Payment",
            "order_id": order.id,

            // ✅ Success callback
            "handler": function (response) {

                // Step 3: Verify payment in backend
                fetch("http://localhost:4040/payment/verify", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(response)
                })
                .then(res => res.text())
                .then(data => {
                    alert(data);

                    // Step 4: Redirect
                    window.location.href = "/success.html";
                });
            },

            // Optional
            "prefill": {
                "name": "Vamsi",
                "email": "vamsi@gmail.com",
                "contact": "9876543210"
            }
        };

        var rzp = new Razorpay(options);
        rzp.open();
    });
}
</script>

</body>
</html>
